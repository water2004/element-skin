services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: elementskin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: elementskin
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elementskin"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./skin-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - DATABASE_DSN=postgresql://elementskin:password@db:5432/elementskin
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./skin-backend/textures:/app/textures
      - ./skin-backend/carousel:/app/carousel
      - ./skin-backend/config.yaml:/app/config.yaml
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./element-skin
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
