# Element-Skin 生产环境配置文件

jwt:
  secret: "prod-secret-please-change-to-a-very-long-string-in-production"  # ⚠️ 生产环境必须修改

# RSA 密钥配置
keys:
  private_key: "/app/private.pem"
  public_key: "/app/public.pem"

database:
  dsn: "postgresql://elementskin:password123@db:5432/elementskin?sslmode=disable"
  max_connections: 20

textures:
  directory: "/app/static/textures"

carousel:
  directory: "/app/static：carousel"

server:
  host: "0.0.0.0"
  port: 8000
  root_path: ""
  site_url: "http://yourdomain.com"
  api_url: "http://yourdomain.com/skinapi"

# CORS 跨域配置
cors:
  allow_origins: ["*"]
  allow_credentials: true

mojang:
  session_url: "https://sessionserver.mojang.com"
  account_url: "https://api.mojang.com"
  services_url: "https://api.minecraftservices.com"
  skin_domains:
    - "textures.minecraft.net"
  cache_ttl: 3600
