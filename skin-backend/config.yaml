# 皮肤站基础配置文件
# 修改后需重启后端生效
# 运营配置（速率限制、材质大小等）请在管理面板修改

# JWT 认证配置
jwt:
  secret: "prod-secret-please-change-to-a-very-long-string-in-production-dev"  # 生产环境务必修改！

# RSA 密钥配置
keys:
  private_key: "private.pem"  # 开发环境使用本地路径
  public_key: "public.pem"

# 数据库配置
database:
  dsn: "postgresql://postgres:12345678@localhost:5432/elementskin?sslmode=disable"
  max_connections: 20

# Redis 配置
# Redis 是验证码、限流、公开设置/首页媒体缓存和短期鉴权缓存的必需依赖
redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  key_prefix: "elementskin:"
  public_cache_ttl_seconds: 60
  auth_cache_ttl_seconds: 30

# 材质存储配置
textures:
  directory: "textures"

# 首页媒体存储配置（目录名沿用 carousel，避免迁移成本）
carousel:
  directory: "carousel"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8000
  site_url: "http://localhost:5173" # 前端站点外部访问地址 (用于 OAuth 回调、材质静态文件等)
  api_url: "http://localhost:8000"  # 后端 API 外部访问地址 (用于 Yggdrasil/Authlib API 入口)
  debug: true  # 开启后会输出所有HTTP请求和响应的详细信息（包括图片请求），用于调试

# CORS 跨域配置
cors:
  # 开发环境允许所有来源
  allow_origins: ["*"]
  allow_credentials: true
